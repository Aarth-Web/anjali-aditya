# Render Blueprint — Static Site
# https://render.com/docs/static-sites
services:
  - type: web
    name: anjali-aditya
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
